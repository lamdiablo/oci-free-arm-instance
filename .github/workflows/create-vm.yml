name: Try to Create OCI VM

on:
  workflow_dispatch:
  schedule:
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"

jobs:
  create-vm:
    runs-on: ubuntu-latest

    env:
      SUPPRESS_LABEL_WARNING: true

      COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
      SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
      IMAGE_ID: ${{ secrets.IMAGE_ID }}
      AD_NAME: ${{ secrets.AD_NAME }}

      OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}

      SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      DISPLAY_NAME: coolify-vm

    steps:
      - name: Install OCI CLI
        run: |
          python3 -m pip install --upgrade pip
          pip3 install oci-cli

      - name: Configure OCI CLI
        run: |
          mkdir -p /home/runner/.oci

          printf "%s" "$OCI_CLI_KEY_CONTENT" > /home/runner/.oci/oci_api_key.pem
          chmod 600 /home/runner/.oci/oci_api_key.pem

          cat > /home/runner/.oci/config <<EOF
          [DEFAULT]
          user=$OCI_CLI_USER
          fingerprint=$OCI_CLI_FINGERPRINT
          tenancy=$OCI_CLI_TENANCY
          region=$OCI_CLI_REGION
          key_file=/home/runner/.oci/oci_api_key.pem
          EOF

          chmod 600 /home/runner/.oci/config

          printf "%s" "$SSH_PUBLIC_KEY" > /home/runner/my_ssh_key.pub

      - name: Validate OCI resources
        run: |
          set -e

          echo "Validate availability domains..."
          oci iam availability-domain list \
            --compartment-id "$COMPARTMENT_ID" \
            --query "data[].name" \
            --raw-output

          echo "Validate subnet..."
          oci network subnet get \
            --subnet-id "$SUBNET_ID" \
            --query "data.{id:id,cidr:\"cidr-block\",publicSubnet:\"prohibit-public-ip-on-vnic\"}" \
            --raw-output

          echo "Validate image..."
          oci compute image get \
            --image-id "$IMAGE_ID" \
            --query "data.{id:id,displayName:\"display-name\",operatingSystem:\"operating-system\",architecture:architecture}" \
            --raw-output

      - name: Try to create OCI ARM instance
        id: create_vm
        continue-on-error: true
        run: |
          set -o pipefail

          OCI_OUTPUT=$(oci compute instance launch \
            --compartment-id "$COMPARTMENT_ID" \
            --availability-domain "$AD_NAME" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus":4,"memoryInGBs":24}' \
            --subnet-id "$SUBNET_ID" \
            --image-id "$IMAGE_ID" \
            --ssh-authorized-keys-file "/home/runner/my_ssh_key.pub" \
            --assign-public-ip true \
            --display-name "$DISPLAY_NAME" \
            --boot-volume-size-in-gbs 200 2>&1 || true)

          echo "$OCI_OUTPUT"

          if echo "$OCI_OUTPUT" | grep -q '"lifecycle-state": "PROVISIONING"'; then
            echo "status=created" >> "$GITHUB_OUTPUT"
            echo "VM is being created."
            exit 0
          elif echo "$OCI_OUTPUT" | grep -q 'Out of host capacity'; then
            echo "status=capacity" >> "$GITHUB_OUTPUT"
            echo "Out of host capacity. Will retry later."
            exit 0
          elif echo "$OCI_OUTPUT" | grep -qi 'timed out'; then
            echo "status=timeout" >> "$GITHUB_OUTPUT"
            echo "OCI endpoint timed out. Will retry later."
            exit 0
          else
            echo "status=error" >> "$GITHUB_OUTPUT"
            echo "Real error detected."
            exit 1
          fi

      - name: Notify Discord
        if: always()
        run: |
          STATUS="${{ steps.create_vm.outputs.status }}"

          if [ "$STATUS" = "created" ]; then
            MESSAGE="🚀 OCI ARM VM CREATED: 4 OCPU / 24GB RAM / 200GB disk. Disable the workflow now."
          elif [ "$STATUS" = "capacity" ]; then
            MESSAGE="⏳ Out of host capacity. Retrying later for 4 OCPU / 24GB RAM / 200GB disk."
          elif [ "$STATUS" = "timeout" ]; then
            MESSAGE="⏳ OCI endpoint timed out. Retrying later for 4 OCPU / 24GB RAM / 200GB disk."
          else
            MESSAGE="❌ OCI VM creation error. Check GitHub Actions logs."
          fi

          curl -H "Content-Type: application/json" \
            -d "{\"content\":\"$MESSAGE\"}" \
            "$DISCORD_WEBHOOK_URL"
